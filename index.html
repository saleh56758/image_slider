<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Image Slider</title>

</head>
<body>

            <img src="https://fastly.picsum.photos/id/433/200/300.jpg?hmac=Y75_deyseM49Q8smDAbeRflgTmOchUngpd-QeDllW0g" alt="Image4">
        </div>
        <i class="fa-solid fa-angles-left btn prev"></i>
